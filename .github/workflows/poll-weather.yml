# Optional manual poll — production uses Vercel Cron (/api/poll-weather).
name: Poll Weather (manual)

on:
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Poll NOAA (writes to Vercel Blob when token set)
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          NOAA_USER_AGENT: ${{ secrets.NOAA_USER_AGENT }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FCM_TOPIC: ${{ secrets.FCM_TOPIC }}
        run: npm run poll
