name: Poll Weather

on:
  schedule:
    # Every 15 minutes (UTC). GitHub may delay scheduled runs on inactive repos.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: poll-weather
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify secrets
        env:
          NOAA_USER_AGENT: ${{ secrets.NOAA_USER_AGENT }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$NOAA_USER_AGENT" ]; then
            echo "::error::NOAA_USER_AGENT secret is not set. Poll will fail."
            exit 1
          fi
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::warning::FIREBASE_SERVICE_ACCOUNT_JSON not set — snapshots will save but no FCM push."
          fi

      - name: Poll NOAA and update snapshots
        env:
          NOAA_USER_AGENT: ${{ secrets.NOAA_USER_AGENT }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FCM_TOPIC: ${{ secrets.FCM_TOPIC }}
        run: npm run poll

      - name: Commit and push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git status
          git diff --staged --stat
          git commit -m "chore(weather): poll $(date -u +%Y-%m-%d-%H%M)"
          git push origin HEAD:main
